<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3팀 안미영 자기소개</title>

    <style>
      /* 전체 배경 설정 */
      body {
        font-family:
          "Pretendard",
          sans-serif;
        background-color: #f0f4f8; 
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
      }

      /* 프로필 카드 스타일 */
      .profile-card {
        background-color: #ffffff;
        padding: 40px;
        border-radius: 24px;
        width: 100%;
        max-width: 500px;
        text-align: left;
      }

      /* 제목 스타일 */
      h1 {
        font-size: 26px;
        color: #111;
        margin-bottom: 25px;
        text-align: center;
      }

      /* (h2) 스타일 */
      h2 {
        font-size: 17px;
        color: #444;
        font-weight: 500;
        margin: 15px 0;
        padding-left: 10px;
        border-left: 4px solid #3692ff; 
      }

      /* 강조 텍스트 */
      .highlight {
        color: #3692ff;
        font-weight: 700;
      }

      /* 버튼 */
      .btn_wrap {
        margin-top: 35px;
        text-align: center;
      }

      .back_btn {
        display: inline-block;
        padding: 14px 28px;
        background-color: #3692ff;
        color: white;
        text-decoration: none;
        border-radius: 12px;
        font-weight: 600;
      }

      .back_btn:hover {
        background-color: #1e70d6;
      }
    </style>
  </head>
  <body>
    <div class="profile-card">
      <h1>👋 3팀 <span class="highlight">안미영</span>입니다</h1>

      <h2>MBTI : INTJ</span></h2>
      <h2>요즘 취미 : 사진편집 📸</h2>
      <h2>좋아하는 음식 : 떡볶이 🥘</h2>
      <h2>
        참여 이유 :<br />
        개발의 처음부터 끝까지전체를 배우고
        싶어서 참여했습니다!
      </h2>

      <div class="btn_wrap">
        <a href="./index.html" class="back_btn">← 홈 화면으로 돌아가기</a>
      </div>
    </div>
  </body>
